AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for the observability telemetry rolling window

Resources:
  TelemetryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: agentcore-demo-telemetry
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      BillingMode: PAY_PER_REQUEST

Outputs:
  TelemetryTableName:
    Description: Name of the telemetry DynamoDB table
    Value: !Ref TelemetryTable
  TelemetryTableArn:
    Description: ARN of the telemetry DynamoDB table
    Value: !GetAtt TelemetryTable.Arn
